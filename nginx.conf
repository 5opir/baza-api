server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # CORS headers
    add_header Access-Control-Allow-Origin 'https://aesthetic-parfait-fe1d13.netlify.app' always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Accept, Authorization, Content-Type, X-Requested-With, Origin' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.env {
        deny all;
    }
}